<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CHSIT Door</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000;
        font-family: Arial, sans-serif;
    }

    .slideshow-container {
        position: static;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
    }

    .slide {
        display: none;
        height: 100%;
        width: 100%;
        text-align: center;
    }

    .slide img {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: fill;
    }


    /* Navigation Buttons */
    .nav-btn {
        position: absolute;
        top: 90%;
        transform: translateY(-50%);
        background-color: rgba(0,0,0,0.5);
        color: white;
        border: none;
        padding: 12px 18px;
        cursor: pointer;
        font-size: 18px;
        border-radius: 4px;
        user-select: none;
        z-index: 10;
    }
    #prevBtn { left: 10px; }
    #nextBtn { right: 10px; }
    .nav-btn:hover {
        background-color: rgba(0,0,0,0.8);
    }
</style>
</head>
<body>


  <div class="slideshow-container">
    <div class="slide">
        <img src="available2.png" alt="Slide 1">
        
    </div>
    <div class="slide">
        <img src="meeting2.png" alt="Slide 2">
        
    </div>
    <div class="slide">
        <img src="out2.png" alt="Slide 3">
        
    </div>
    <div class="slide">
        <img src="closed2.png" alt="Slide 4">
        
    </div>
</div>


    <!-- Navigation Buttons -->
    <button id="prevBtn" class="nav-btn">&#10094; Prev</button>
    <button id="nextBtn" class="nav-btn">Next &#10095;</button>
</div>

<script>
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

// Show the first slide initially
showSlide(currentSlide);

function showSlide(index) {
    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;
    currentSlide = index;
    slides.forEach(slide => slide.style.display = "none");
    slides[currentSlide].style.display = "block";
}

// Number key navigation (1–4)
document.addEventListener("keydown", function(event) {
    if (event.key >= "1" && event.key <= "4") {
        showSlide(parseInt(event.key, 10) - 1);
    }
});

// Button navigation
document.getElementById("prevBtn").addEventListener("click", function() {
    showSlide(currentSlide - 1);
});
document.getElementById("nextBtn").addEventListener("click", function() {
    showSlide(currentSlide + 1);
});


</script>

</body>
</html>
